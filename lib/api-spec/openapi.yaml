openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: still
    description: Still journaling companion
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /still/extract:
    post:
      operationId: extractCandidates
      tags: [still]
      summary: Extract remembrance candidates from journal entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInput"
      responses:
        "200":
          description: Extracted candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/score:
    post:
      operationId: scoreCandidates
      tags: [still]
      summary: Score candidates and select the one thing worth returning to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "200":
          description: Scored result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/entries:
    get:
      operationId: listEntries
      tags: [still]
      summary: List all stored journal entries
      responses:
        "200":
          description: Stored entries, most recent entry date first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEntry
      tags: [still]
      summary: Store a single journal entry verbatim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/entries/{id}:
    get:
      operationId: getEntry
      tags: [still]
      summary: Fetch a single stored entry's full text by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The stored entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Entry:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - date
        - text
        - createdAt
    EntryInput:
      type: object
      properties:
        date:
          type: string
          minLength: 1
        text:
          type: string
      required:
        - date
        - text
    Quote:
      type: object
      properties:
        date:
          type: string
        fragment:
          type: string
        source_type:
          type: string
          enum: [journal, saved_quote, copied_text, unknown]
      required:
        - date
        - fragment
        - source_type
    Candidate:
      type: object
      properties:
        mode:
          type: string
          enum: [thread, memory, distance, value_signal, wisdom]
        candidate_title:
          type: string
        function:
          type: string
        description:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why_it_matters:
          type: string
      required:
        - mode
        - function
        - description
        - evidence
        - why_it_matters
    ExtractInput:
      type: object
      properties:
        entries:
          type: string
      required:
        - entries
    ExtractResult:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    CandidateScore:
      type: object
      properties:
        mode:
          type: string
        candidate_title:
          type: string
        safety:
          type: number
        worth_returning_to:
          type: number
        recognition:
          type: number
        specificity:
          type: number
        persistence:
          type: ["number", "null"]
        same_function_different_language:
          type: ["number", "null"]
        vividness:
          type: ["number", "null"]
        revealing:
          type: ["number", "null"]
        contrast:
          type: ["number", "null"]
        evidence_across_time:
          type: ["number", "null"]
        meaningfulness_of_selection:
          type: ["number", "null"]
        attribution_confidence:
          type: ["number", "null"]
        clarity:
          type: ["number", "null"]
        earnedness:
          type: ["number", "null"]
        surfaceable:
          type: boolean
        why:
          type: string
      required:
        - mode
        - safety
        - worth_returning_to
        - recognition
        - specificity
        - surfaceable
        - why
    ScoreInput:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    ScoreResult:
      type: object
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/CandidateScore"
        mode:
          type: string
          enum: [thread, memory, distance, value_signal, wisdom, nothing]
        label:
          type: ["string", "null"]
        observation:
          type: ["string", "null"]
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why:
          type: string
        message:
          type: ["string", "null"]
      required:
        - scores
        - mode
        - quotes
        - why
