openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: still
    description: Still journaling companion
  - name: entries
    description: Journal entries
  - name: memories
    description: Returned memories
  - name: imports
    description: Importing historical journals
  - name: reflections
    description: Reflections written across time
  - name: privacy
    description: Data export and account deletion
  - name: auth
    description: Authentication and accounts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /still/extract:
    post:
      operationId: extractCandidates
      tags: [still]
      summary: Extract remembrance candidates from journal entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInput"
      responses:
        "200":
          description: Extracted candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/score:
    post:
      operationId: scoreCandidates
      tags: [still]
      summary: Score candidates and select the one thing worth returning to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "200":
          description: Scored result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List the current user's journal entries
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: favorite
          in: query
          required: false
          schema:
            type: boolean
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: The user's entries, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Create a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /entries/{id}:
    get:
      operationId: getEntry
      tags: [entries]
      summary: Fetch a single entry by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEntry
      tags: [entries]
      summary: Update an entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryUpdate"
      responses:
        "200":
          description: The updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEntry
      tags: [entries]
      summary: Delete an entry (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/paste:
    post:
      operationId: importPaste
      tags: [imports]
      summary: Parse pasted journal text into reviewable entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPasteInput"
      responses:
        "200":
          description: The import session with parsed entries to review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportReview"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/file:
    post:
      operationId: importFile
      tags: [imports]
      summary: Parse an uploaded .txt/.md file's text into reviewable entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportFileInput"
      responses:
        "200":
          description: The import session with parsed entries to review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportReview"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/{id}/review:
    get:
      operationId: getImportReview
      tags: [imports]
      summary: Get an import session and its parsed entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The import review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportReview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/{id}/parsed/{parsedEntryId}:
    patch:
      operationId: updateParsedEntry
      tags: [imports]
      summary: Edit a parsed entry before import (date, body, title, include)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: parsedEntryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsedEntryUpdate"
      responses:
        "200":
          description: The updated parsed entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/{id}/confirm:
    post:
      operationId: confirmImport
      tags: [imports]
      summary: Create journal entries from the included parsed entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Import confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportConfirmResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /entries/{id}/reflections:
    get:
      operationId: listReflections
      tags: [reflections]
      summary: List reflections written on an entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reflections, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reflection"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createReflection
      tags: [reflections]
      summary: Write a reflection on an entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectionInput"
      responses:
        "201":
          description: The created reflection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reflection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reflections/{id}:
    patch:
      operationId: updateReflection
      tags: [reflections]
      summary: Edit a reflection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectionUpdate"
      responses:
        "200":
          description: The updated reflection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reflection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReflection
      tags: [reflections]
      summary: Delete a reflection (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /memories/run:
    post:
      operationId: runMemory
      tags: [memories]
      summary: Run the engine over eligible entries and surface one thing (or stay quiet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryRunInput"
      responses:
        "200":
          description: A surfaced memory, honest silence, or a support response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryRunResult"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /memories:
    get:
      operationId: listMemories
      tags: [memories]
      summary: List the user's returned memories
      responses:
        "200":
          description: Returned memories, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReturnedMemory"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /memories/{id}:
    get:
      operationId: getMemory
      tags: [memories]
      summary: Fetch a returned memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedMemory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMemory
      tags: [memories]
      summary: Favorite, dismiss, or mark a memory opened
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryUpdate"
      responses:
        "200":
          description: The updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedMemory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /privacy/export:
    get:
      operationId: exportData
      tags: [privacy]
      summary: Export all of the current user's data
      responses:
        "200":
          description: Everything the user has written and been returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExport"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /privacy/account:
    delete:
      operationId: deleteAccount
      tags: [privacy]
      summary: Permanently delete the account and all associated data
      responses:
        "204":
          description: Account and all data deleted
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create an account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Account created and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out of the current session
      responses:
        "204":
          description: Signed out
  /auth/complete-onboarding:
    post:
      operationId: completeOnboarding
      tags: [auth]
      summary: Mark the current user's onboarding as complete
      responses:
        "200":
          description: The updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
      required:
        - id
        - email
        - onboardingCompleted
    RegisterInput:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 3
        password:
          type: string
          minLength: 8
        name:
          type: string
      required:
        - email
        - password
    LoginInput:
      type: object
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    Entry:
      type: object
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        body:
          type: string
        entryDate:
          type: ["string", "null"]
        source:
          type: string
          enum: [manual, pasted_import, file_import, google_doc, sample]
        favorite:
          type: boolean
        resurfacingPreference:
          type: string
          enum: [normal, more_often, never]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - body
        - source
        - favorite
        - resurfacingPreference
        - createdAt
        - updatedAt
    EntryInput:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
          minLength: 1
        entryDate:
          type: string
      required:
        - body
    EntryUpdate:
      type: object
      properties:
        title:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        entryDate:
          type: ["string", "null"]
        favorite:
          type: boolean
        resurfacingPreference:
          type: string
          enum: [normal, more_often, never]
    PrivacyExport:
      type: object
      properties:
        exportedAt:
          type: string
          format: date-time
        account:
          type: object
          properties:
            email:
              type: string
            name:
              type: ["string", "null"]
            createdAt:
              type: string
              format: date-time
          required:
            - email
            - createdAt
        entries:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
        reflections:
          type: array
          items:
            $ref: "#/components/schemas/Reflection"
        memories:
          type: array
          items:
            $ref: "#/components/schemas/ReturnedMemory"
      required:
        - exportedAt
        - account
        - entries
        - reflections
        - memories
    Reflection:
      type: object
      properties:
        id:
          type: string
        journalEntryId:
          type: string
        body:
          type: string
        reflectionDate:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - journalEntryId
        - body
        - createdAt
        - updatedAt
    ReflectionInput:
      type: object
      properties:
        body:
          type: string
          minLength: 1
      required:
        - body
    ReflectionUpdate:
      type: object
      properties:
        body:
          type: string
          minLength: 1
      required:
        - body
    ParsedEntry:
      type: object
      properties:
        id:
          type: string
        detectedDate:
          type: ["string", "null"]
        dateConfidence:
          type: string
          enum: [high, medium, low, unknown]
        body:
          type: string
        title:
          type: ["string", "null"]
        include:
          type: boolean
        orderIndex:
          type: ["integer", "null"]
      required:
        - id
        - dateConfidence
        - body
        - include
    ImportReview:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        status:
          type: string
        parsedCount:
          type: integer
        importedCount:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ParsedEntry"
      required:
        - id
        - source
        - status
        - parsedCount
        - importedCount
        - entries
    ImportPasteInput:
      type: object
      properties:
        rawText:
          type: string
          minLength: 1
      required:
        - rawText
    ImportFileInput:
      type: object
      properties:
        filename:
          type: string
        rawText:
          type: string
          minLength: 1
      required:
        - filename
        - rawText
    ParsedEntryUpdate:
      type: object
      properties:
        detectedDate:
          type: ["string", "null"]
        body:
          type: string
        title:
          type: ["string", "null"]
        include:
          type: boolean
    ImportConfirmResult:
      type: object
      properties:
        importedCount:
          type: integer
      required:
        - importedCount
    ReturnedMemory:
      type: object
      properties:
        id:
          type: string
        label:
          type: ["string", "null"]
        observation:
          type: ["string", "null"]
        quote:
          type: ["string", "null"]
        quoteDate:
          type: ["string", "null"]
        lens:
          type: ["string", "null"]
        journalEntryId:
          type: ["string", "null"]
        dismissed:
          type: boolean
        favorite:
          type: boolean
        createdAt:
          type: string
          format: date-time
        openedAt:
          type: ["string", "null"]
      required:
        - id
        - dismissed
        - favorite
        - createdAt
    MemoryRunInput:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        entryIds:
          type: array
          items:
            type: string
        fresh:
          type: boolean
    MemoryRunResult:
      type: object
      properties:
        surfaced:
          type: boolean
        reason:
          type: ["string", "null"]
        supportMessage:
          type: ["string", "null"]
        memory:
          $ref: "#/components/schemas/ReturnedMemory"
      required:
        - surfaced
    MemoryUpdate:
      type: object
      properties:
        favorite:
          type: boolean
        dismissed:
          type: boolean
        opened:
          type: boolean
    Quote:
      type: object
      properties:
        date:
          type: string
        fragment:
          type: string
        source_type:
          type: string
          enum: [journal, saved_quote, copied_text, unknown]
      required:
        - date
        - fragment
        - source_type
    Candidate:
      type: object
      properties:
        mode:
          type: string
          enum: [thread, memory, distance, value_signal, wisdom]
        candidate_title:
          type: string
        function:
          type: string
        description:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why_it_matters:
          type: string
      required:
        - mode
        - function
        - description
        - evidence
        - why_it_matters
    ExtractInput:
      type: object
      properties:
        entries:
          type: string
      required:
        - entries
    ExtractResult:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    CandidateScore:
      type: object
      properties:
        mode:
          type: string
        candidate_title:
          type: string
        safety:
          type: number
        worth_returning_to:
          type: number
        recognition:
          type: number
        specificity:
          type: number
        persistence:
          type: ["number", "null"]
        same_function_different_language:
          type: ["number", "null"]
        vividness:
