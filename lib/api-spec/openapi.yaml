openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: still
    description: Still journaling companion
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /still/extract:
    post:
      operationId: extractCandidates
      tags: [still]
      summary: Extract remembrance candidates from journal entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInput"
      responses:
        "200":
          description: Extracted candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/score:
    post:
      operationId: scoreCandidates
      tags: [still]
      summary: Score candidates and select the one thing worth returning to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "200":
          description: Scored result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Quote:
      type: object
      properties:
        date:
          type: string
        fragment:
          type: string
        source_type:
          type: string
          enum: [journal, saved_quote, copied_text, unknown]
      required:
        - date
        - fragment
        - source_type
    Candidate:
      type: object
      properties:
        register:
          type: string
          enum: [thread, memory, distance, value_signal, becoming, survival]
        function:
          type: string
        description:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why_it_matters:
          type: string
      required:
        - register
        - function
        - description
        - evidence
        - why_it_matters
    ExtractInput:
      type: object
      properties:
        entries:
          type: string
      required:
        - entries
    ExtractResult:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    CandidateScore:
      type: object
      properties:
        function:
          type: string
        register:
          type: string
        evidence_strength:
          type: number
        recognition:
          type: number
        emotional_truth:
          type: number
        safety:
          type: number
        worth_returning_to:
          type: number
        non_horoscope_specificity:
          type: number
        perspective_not_wound:
          type: number
        surfaceable:
          type: boolean
        why:
          type: string
      required:
        - function
        - register
        - evidence_strength
        - recognition
        - emotional_truth
        - safety
        - worth_returning_to
        - non_horoscope_specificity
        - perspective_not_wound
        - surfaceable
        - why
    ScoreInput:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    ScoreResult:
      type: object
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/CandidateScore"
        register:
          type: string
          enum: [thread, memory, distance, value_signal, becoming, survival, nothing]
        label:
          type: ["string", "null"]
        observation:
          type: ["string", "null"]
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why:
          type: string
        message:
          type: ["string", "null"]
      required:
        - scores
        - register
        - quotes
        - why
