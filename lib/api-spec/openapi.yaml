openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: still
    description: Still journaling companion
  - name: entries
    description: Journal entries
  - name: auth
    description: Authentication and accounts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /still/extract:
    post:
      operationId: extractCandidates
      tags: [still]
      summary: Extract remembrance candidates from journal entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractInput"
      responses:
        "200":
          description: Extracted candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /still/score:
    post:
      operationId: scoreCandidates
      tags: [still]
      summary: Score candidates and select the one thing worth returning to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "200":
          description: Scored result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List the current user's journal entries
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: favorite
          in: query
          required: false
          schema:
            type: boolean
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: The user's entries, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Create a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /entries/{id}:
    get:
      operationId: getEntry
      tags: [entries]
      summary: Fetch a single entry by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEntry
      tags: [entries]
      summary: Update an entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryUpdate"
      responses:
        "200":
          description: The updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEntry
      tags: [entries]
      summary: Delete an entry (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create an account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Account created and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out of the current session
      responses:
        "204":
          description: Signed out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
      required:
        - id
        - email
    RegisterInput:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 3
        password:
          type: string
          minLength: 8
        name:
          type: string
      required:
        - email
        - password
    LoginInput:
      type: object
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    Entry:
      type: object
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        body:
          type: string
        entryDate:
          type: ["string", "null"]
        source:
          type: string
          enum: [manual, pasted_import, file_import, google_doc, sample]
        favorite:
          type: boolean
        resurfacingPreference:
          type: string
          enum: [normal, more_often, never]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - body
        - source
        - favorite
        - resurfacingPreference
        - createdAt
        - updatedAt
    EntryInput:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
          minLength: 1
        entryDate:
          type: string
      required:
        - body
    EntryUpdate:
      type: object
      properties:
        title:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        entryDate:
          type: ["string", "null"]
        favorite:
          type: boolean
        resurfacingPreference:
          type: string
          enum: [normal, more_often, never]
    Quote:
      type: object
      properties:
        date:
          type: string
        fragment:
          type: string
        source_type:
          type: string
          enum: [journal, saved_quote, copied_text, unknown]
      required:
        - date
        - fragment
        - source_type
    Candidate:
      type: object
      properties:
        mode:
          type: string
          enum: [thread, memory, distance, value_signal, wisdom]
        candidate_title:
          type: string
        function:
          type: string
        description:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why_it_matters:
          type: string
      required:
        - mode
        - function
        - description
        - evidence
        - why_it_matters
    ExtractInput:
      type: object
      properties:
        entries:
          type: string
      required:
        - entries
    ExtractResult:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    CandidateScore:
      type: object
      properties:
        mode:
          type: string
        candidate_title:
          type: string
        safety:
          type: number
        worth_returning_to:
          type: number
        recognition:
          type: number
        specificity:
          type: number
        persistence:
          type: ["number", "null"]
        same_function_different_language:
          type: ["number", "null"]
        vividness:
          type: ["number", "null"]
        revealing:
          type: ["number", "null"]
        contrast:
          type: ["number", "null"]
        evidence_across_time:
          type: ["number", "null"]
        meaningfulness_of_selection:
          type: ["number", "null"]
        attribution_confidence:
          type: ["number", "null"]
        clarity:
          type: ["number", "null"]
        earnedness:
          type: ["number", "null"]
        surfaceable:
          type: boolean
        why:
          type: string
      required:
        - mode
        - safety
        - worth_returning_to
        - recognition
        - specificity
        - surfaceable
        - why
    ScoreInput:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
      required:
        - candidates
    ScoreResult:
      type: object
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/CandidateScore"
        mode:
          type: string
          enum: [thread, memory, distance, value_signal, wisdom, nothing]
        label:
          type: ["string", "null"]
        observation:
          type: ["string", "null"]
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
        why:
          type: string
        message:
          type: ["string", "null"]
      required:
        - scores
        - mode
        - quotes
        - why
